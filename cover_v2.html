<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlorDesk - Armonía Neón</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a1a 100%);
            position: relative;
            overflow: hidden;
        }
        
        .neon-text {
            font-family: 'Orbitron', monospace;
            text-shadow: 
                0 0 5px #00ffff,
                0 0 10px #00ffff,
                0 0 15px #00ffff,
                0 0 20px #00ffff;
            animation: flicker 2s infinite alternate;
        }
        
        .neon-subtitle {
            font-family: 'Rajdhani', sans-serif;
            text-shadow: 
                0 0 5px #ffbf00,
                0 0 10px #ffbf00;
            animation: pulse 3s infinite;
        }
        
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 15px #00ffff, 0 0 20px #00ffff;
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
        }
        
        .bg-image {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%;
            height: 100%;
            background-image: url('/home/ubuntu/flordesk_presentacion/hero_organizer.png');
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            filter: contrast(1.2) saturate(1.2);
        }
        
        .bg-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, rgba(10, 10, 10, 1) 0%, rgba(10, 10, 10, 0.7) 40%, rgba(10, 10, 10, 0.2) 100%);
        }

        .accent-bar {
            position: absolute;
            left: 0;
            top: 25%;
            width: 6px;
            height: 50%;
            background: #ffbf00;
            box-shadow: 0 0 15px #ffbf00;
        }
    </style>
</head>
<body>
    <div class="slide-container flex items-center justify-start relative">
        <div class="grid-overlay"></div>
        <div class="bg-image"></div>
        <div class="bg-overlay"></div>
        <div class="accent-bar"></div>
        
        <div class="relative z-10 pl-24">
            <div class="mb-10">
                <h1 class="neon-text text-9xl font-black text-cyan-400 mb-2 tracking-tighter transform -skew-x-12">
                    FLOR
                </h1>
                <h1 class="neon-text text-9xl font-black text-cyan-400 ml-20 tracking-tighter transform skew-x-12">
                    DESK
                </h1>
            </div>
            
            <div class="ml-12">
                <h2 class="neon-subtitle text-4xl font-bold text-amber-400 mb-8 tracking-widest uppercase">
                    Armonía Creativa
                </h2>
                
                <div class="text-white text-xl font-light tracking-widest opacity-90 border-l-4 border-cyan-400 pl-6">
                    <p class="mb-2">ORGANIZACIÓN ESCOLAR FUTURISTA</p>
                    <p class="mb-2">MATERIALES RECICLADOS DE ALTA DENSIDAD</p>
                    <p>DISEÑO INSPIRADO EN LA NATURALEZA</p>
                </div>
            </div>
        </div>
        
        <div class="absolute bottom-12 right-12 text-cyan-400 text-2xl font-bold opacity-60">
            <div class="w-16 h-16 border-2 border-amber-400 rounded-none flex items-center justify-center transform rotate-45">
                <span class="transform -rotate-45 text-amber-400">01</span>
            </div>
        </div>
    </div>
</body>
</html>
